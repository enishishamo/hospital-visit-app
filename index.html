    function StarRating({ value, onChange, readonly, small }) {
      const [hover, setHover] = useState(0);
      const size = small ? 13 : (readonly ? 16 : 22);
      return (
        <div style={{ display: "flex", gap: 1 }}>
          {[1,2,3,4,5].map(s => (
            <button key={s} type="button"
              onClick={() => !readonly && onChange(s)}

              style={{
                background: "none", border: "none",

    /* ===== RadarChart ===== */
    function RadarChart({ ratings, size = 220 }) {
      const cx = size/2, cy = size/2, r = size * 0.33;
      const n = CATEGORIES.length;
      const angle = i => Math.PI*2*i/n - Math.PI/2;
      const pt = (i, val) => ({
        x: cx + r*(val/5)*Math.cos(angle(i)),
        y: cy + r*(val/5)*Math.sin(angle(i)),
      });
      const values     = CATEGORIES.map(c => ratings[c.key] || 0);
      const dataPoints = values.map((v,i) => pt(i,v));
      return (
        <svg viewBox={`0 0 ${size} ${size}`} style={{ width:"100%", maxWidth: size }}>
          {[1,2,3,4,5].map(lv => (
            <polygon key={lv}
              points={CATEGORIES.map((_,i) => { const p=pt(i,lv); return `${p.x},${p.y}`; }).join(" ")}
              fill="none" stroke="#d1ddd8"
              strokeWidth={lv===5 ? 1.5 : 0.5} opacity={0.7}
            />
          ))}
          {CATEGORIES.map((_,i) => {
            const p = pt(i,5);
            return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#d1ddd8" strokeWidth={0.5}/>;
          })}
          <polygon
            points={dataPoints.map(p=>`${p.x},${p.y}`).join(" ")}
            fill="rgba(15,138,108,0.18)" stroke="#0f8a6c" strokeWidth={2}
          />
          {dataPoints.map((p,i) => <circle key={i} cx={p.x} cy={p.y} r={3} fill="#0f8a6c"/>)}
          {CATEGORIES.map((c,i) => {
            const lr = r + 26;
            return (
              <text key={i}
                x={cx + lr*Math.cos(angle(i))}
                y={cy + lr*Math.sin(angle(i))}
                textAnchor="middle" dominantBaseline="central"
                style={{ fontSize: 9, fill: "#4a6358", fontFamily:"'Zen Kaku Gothic New',sans-serif" }}
              >{c.icon} {c.label}</text>
            );
          })}
        </svg>
      );
    }

      useEffect(() => {
        try { localStorage.setItem("byouin_v2", JSON.stringify(hospitals)); } catch {}
      }, [hospitals]);

      const avgRating = h => {
        const totalWeight = CATEGORIES.reduce((s,c) => s + (weights[c.key] > 0 ? weights[c.key] : 0), 0);
        if (totalWeight === 0) return 0;
        const weighted = CATEGORIES.reduce((s,c) => s + (h.ratings[c.key]||0) * (weights[c.key] > 0 ? weights[c.key] : 0), 0);
        return weighted / totalWeight;
      };

        .filter(h => {

          return (!q || h.name.toLowerCase().includes(q) || (h.department||"").toLowerCase().includes(q))
;
        })
        .sort((a,b) => {
          if (sortBy==="date")   return b.date.localeCompare(a.date);
          if (sortBy==="rating") return avgRating(b) - avgRating(a);
          return a.name.localeCompare(b.name);
        });


      const saveHospital = () => {
        if (!form.name.trim()) return;

          setHospitals(prev => prev.map(h => h.id===editId ? {...form, id:editId} : h));

        a.href = url;

        a.click();
        URL.revokeObjectURL(url);

        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (Array.isArray(data)) {
              setHospitals(prev => {
                const existingIds = new Set(prev.map(h => h.id));
                const newItems = data.filter(h => !existingIds.has(h.id));
                return [...prev, ...newItems];
              });
              alert(`${data.length}件をインポートしました`);
            }
          } catch { alert("ファイルの読み込みに失敗しました"); }
        };
        reader.readAsText(file);
        e.target.value = "";
      };

                          <span style={{ fontSize:11, fontWeight:700, padding:"2px 9px", borderRadius:5,
                            background: WEIGHT_COLORS[weights[c.key]]+"22", color: WEIGHT_COLORS[weights[c.key]] }}>
                            {WEIGHT_LABELS[weights[c.key]]}
                          </span>
                        </div>
                        <div style={{ display:"flex", gap:5 }}>
                          {WEIGHT_LABELS.map((label, i) => (
                            <button key={i} type="button" onClick={()=>setWeights({...weights, [c.key]: i})}
                              style={{
                                flex:1, padding:"7px 2px", borderRadius:7, fontSize:10, fontWeight:700, cursor:"pointer",
                                border: weights[c.key]===i ? `2px solid ${WEIGHT_COLORS[i]}` : "2px solid #e4ece8",
                                background: weights[c.key]===i ? WEIGHT_COLORS[i]+"22" : "#fff",
                                color: weights[c.key]===i ? WEIGHT_COLORS[i] : "#a8b8b0",
                                transition:"all .12s",
                              }}
                            >{label}</button>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {/* データ管理 */}
                {settingsSection === "data" && (
                  <div>
                    <div style={{ fontSize:15, fontWeight:900, color:"#1a2e24", marginBottom:4 }}>💾 データ管理</div>
                    <div style={{ fontSize:12, color:"#7a9489", marginBottom:20 }}>機種変更・バックアップ・友達との共有に使えます</div>

                    <div style={{ background:"#fff", borderRadius:14, border:"1px solid #e4ece8", padding:20, marginBottom:12 }}>
                      <div style={{ fontSize:14, fontWeight:700, color:"#1a2e24", marginBottom:4 }}>📤 エクスポート</div>
                      <div style={{ fontSize:12, color:"#7a9489", marginBottom:12 }}>全記録をJSONファイルで保存します（{hospitals.length}件）</div>
                      <button onClick={exportData}
                        style={{ width:"100%", padding:"12px", borderRadius:11, border:"none",
                          background:"linear-gradient(135deg,#0f8a6c,#12a67e)", color:"#fff",
                          fontWeight:700, fontSize:14, cursor:"pointer" }}
                      >ファイルに書き出す</button>
                    </div>

                    <div style={{ background:"#fff", borderRadius:14, border:"1px solid #e4ece8", padding:20 }}>
                      <div style={{ fontSize:14, fontWeight:700, color:"#1a2e24", marginBottom:4 }}>📥 インポート</div>
                      <div style={{ fontSize:12, color:"#7a9489", marginBottom:12 }}>エクスポートしたJSONファイルを読み込みます（重複は自動スキップ）</div>
                      <label style={{ display:"block", padding:"12px", borderRadius:11, border:"2px dashed #c8d8d0",
                        textAlign:"center", cursor:"pointer", color:"#7a9489", fontSize:13, background:"#fafcfb" }}>
                        📂 ファイルを選択
                        <input type="file" accept=".json" onChange={importData} style={{ display:"none" }}/>
                      </label>
                    </div>
                  </div>
                )}

                {/* 見学前持ち物チェックリスト */}
                {settingsSection === "checklist" && (
                  <div>
                    <div style={{ fontSize:15, fontWeight:900, color:"#1a2e24", marginBottom:4 }}>📋 見学前 持ち物チェックリスト</div>
                    <div style={{ fontSize:12, color:"#7a9489", marginBottom:16 }}>見学当日の準備に使ってください（毎回リセットされます）</div>
                    <div style={{ background:"#fff", borderRadius:14, border:"1px solid #e4ece8", overflow:"hidden" }}>
                      {[
                        "💳 財布（ホテル代含む）","📱 携帯・充電器","👔 着替え・下着",
                        "⏰ 目覚まし時計","🪪 身分証明書・学生証","🧴 洗顔グッズ",
                        "🧥 白衣","🩺 聴診器","🖊️ 筆記用具・メモ帳",
                        "💾 USB（過去問用）","⌚ 腕時計","🏷️ ネームプレート",
                        "👗 着圧ソックス","🎒 セカンドバッグ","📱 iPad・タブレット",
                      ].map((item, i, arr) => {
                        const checked = !!packingChecks[i];
                        return (
                          <div key={i}
                            onClick={()=>setPackingChecks(prev=>({...prev, [i]:!prev[i]}))}
                            style={{
                              display:"flex", alignItems:"center", gap:12, padding:"12px 16px",
                              borderBottom: i<arr.length-1 ? "1px solid #f0f4f2" : "none",
                              cursor:"pointer", background: checked ? "#f0f9f5" : "#fff",
                              transition:"background .12s",
                            }}
                          >
                            <div style={{
                              width:22, height:22, borderRadius:6, flexShrink:0,
                              border: checked ? "none" : "2px solid #d1ddd8",
                              background: checked ? "#0f8a6c" : "transparent",
                              display:"flex", alignItems:"center", justifyContent:"center",
                            }}>
                              {checked && <span style={{ color:"#fff", fontSize:14, fontWeight:700 }}>✓</span>}
                            </div>
                            <span style={{ fontSize:13, color: checked ? "#1a2e24" : "#7a9489" }}>{item}</span>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{ fontSize:11, color:"#a8b8b0", textAlign:"center", marginTop:10 }}>
                      ※ このチェックは保存されません（毎回リセット）
                    </div>
                  </div>
                )}
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
